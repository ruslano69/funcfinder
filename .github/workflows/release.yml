name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build cross-platform binaries
      run: |
        mkdir -p dist
        TOOLS="funcfinder stat deps complexity callgraph docsearch"

        for OS_ARCH in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
          GOOS=${OS_ARCH%/*}
          GOARCH=${OS_ARCH#*/}
          echo "Building for $GOOS/$GOARCH..."
          for tool in $TOOLS; do
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            GOOS=$GOOS GOARCH=$GOARCH go build -o dist/${tool}-${GOOS}-${GOARCH}${EXT} ./cmd/${tool}
          done
        done

        echo "Building for windows/amd64..."
        for tool in $TOOLS; do
          GOOS=windows GOARCH=amd64 go build -o dist/${tool}-windows-amd64.exe ./cmd/${tool}
        done

    - name: Create archives
      run: |
        cd dist
        VER=${{ steps.get_version.outputs.VERSION }}
        TOOLS="funcfinder stat deps complexity callgraph docsearch"

        for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
          FILES=""
          for tool in $TOOLS; do FILES="$FILES ${tool}-${PLATFORM}"; done
          tar czf funcfinder-${VER}-${PLATFORM}.tar.gz $FILES
        done

        FILES=""
        for tool in $TOOLS; do FILES="$FILES ${tool}-windows-amd64.exe"; done
        zip funcfinder-${VER}-windows-amd64.zip $FILES

    - name: Generate checksums
      run: |
        cd dist
        sha256sum *.tar.gz *.zip > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.tar.gz
          dist/*.zip
          dist/checksums.txt
        body: |
          ## funcfinder v${{ steps.get_version.outputs.VERSION }}

          ### What's New
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### Installation

          #### Linux / macOS
          ```bash
          tar xzf funcfinder-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz
          sudo mv funcfinder-* stat-* deps-* complexity-* callgraph-* docsearch-* /usr/local/bin/
          ```

          #### Windows
          Download `funcfinder-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip` and extract to a directory in your PATH.

          ### Verify Checksums
          ```bash
          sha256sum -c checksums.txt
          ```

          ### Tools
          - **funcfinder**: Map functions/structs, extract bodies
          - **stat**: File statistics — LOC, comments, imports
          - **deps**: Dependency analysis with JSON output
          - **complexity**: Cognitive complexity per function
          - **callgraph**: Who calls whom
          - **docsearch**: SQLite FTS5 + vector hybrid knowledge base for agents
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
