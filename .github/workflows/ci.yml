name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod download

    - name: Run tests (race)
      run: go test -v -race -p 1 ./internal/...

    - name: Run tests (coverage)
      # A zero-test package can fail coverage with `go: no such tool "covdata"`;
      # bare exit 1 and no FAIL/panic anywhere in the log — root cause
      # traced to `go: no such tool "covdata"` for internal/embed (the only
      # package with zero test files): computing its coverage line needs
      # covdata, which this runner's Go install doesn't have. Excluding the
      # untested package sidesteps it entirely; -race was never the actual
      # cause, but the split into a separate step (kept from the bisection)
      # still stands on its own merits — a real race no longer risks being
      # masked by an unrelated coverage-tooling failure.
      run: |
        PKGS=$(go list ./internal/... | grep -v '/internal/embed$')
        go test -coverprofile=coverage.txt -covermode=atomic $PKGS

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-umbrella

    - name: Generate coverage report
      run: |
        go tool cover -func=coverage.txt > coverage.txt.summary
        echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -1 coverage.txt.summary >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build all binaries
      run: |
        echo "Building funcfinder toolkit..."
        ./build.sh

    - name: Test binaries
      run: |
        ./funcfinder --version
        ./stat --version
        ./deps --version
        ./complexity --version
        ./callgraph --version

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-linux
        path: |
          funcfinder
          stat
          deps
          complexity
          callgraph
        retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build Windows binaries
      run: .\build.ps1

    - name: Test binaries
      run: |
        .\funcfinder.exe --version
        .\stat.exe --version
        .\deps.exe --version
        .\complexity.exe --version
        .\callgraph.exe --version

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-windows
        path: |
          funcfinder.exe
          stat.exe
          deps.exe
          complexity.exe
          callgraph.exe
        retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build macOS binaries
      run: ./build.sh

    - name: Test binaries
      run: |
        ./funcfinder --version
        ./stat --version
        ./deps --version
        ./complexity --version
        ./callgraph --version

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-macos
        path: |
          funcfinder
          stat
          deps
          complexity
          callgraph
        retention-days: 7
